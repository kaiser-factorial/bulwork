<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BULWORK MODE — blocked</title>
    <style>
      :root {
        --bg: #0a0f0a;
        --fg: #6ee7a8;
        --dim: #2f6f4e;
        --red: #ff6b6b;
        --line: #173b29;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .wrap {
        max-width: 640px;
        margin: 0 auto;
        min-height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 32px 24px;
        gap: 18px;
      }
      .brick { letter-spacing: 0.4em; color: var(--red); font-weight: 700; }
      /* two-tone BULWORK wordmark: BUL in the existing dim/inactive gold, WORK in the existing
         session-yellow (both already used for card text in overlay.js) — never mixed-case. */
      .bw-bul { color: #cda94e; }
      .bw-work { color: #fbd962; }
      h1 { font-size: 1.6rem; margin: 0; }
      .row { border-top: 1px solid var(--line); padding-top: 12px; }
      .label { color: var(--dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; }
      .value { word-break: break-all; }
      .focus { color: var(--fg); font-size: 1.2rem; }
      button {
        align-self: flex-start;
        margin-top: 8px;
        background: transparent;
        color: var(--fg);
        border: 1px solid var(--fg);
        padding: 8px 16px;
        font-family: inherit;
        cursor: pointer;
        border-radius: 2px;
      }
      button:hover { background: var(--fg); color: var(--bg); }
      .stub { color: #d9a441; font-size: 0.8rem; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brick">■ <span class="bw-bul">BUL</span><span class="bw-work">WORK</span> MODE</div>
      <h1>Blocked — stay on task.</h1>
      <div class="row">
        <div class="label">Your focus</div>
        <div id="focus" class="focus">…</div>
      </div>
      <div class="row">
        <div class="label">Blocked</div>
        <div id="url" class="value">…</div>
      </div>
      <div class="row">
        <div class="label">Reason</div>
        <div id="reason" class="value">…</div>
      </div>
      <button id="back">← back to work</button>
      <div id="stub" class="stub"></div>
    </div>
    <script src="block.js"></script>
  </body>
</html>
